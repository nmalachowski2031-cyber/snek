<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Ultimate Custom Grid</title>
    <style>
        body { 
            background: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: sans-serif; 
            flex-direction: column; 
            padding: 10px;
        }
        #ui-container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            backdrop-filter: blur(10px); 
            width: 90vw; 
            max-width: 400px;
            max-height: 95vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); 
            border: 3px solid lime; 
            border-radius: 5px;
            max-width: 100%;
            max-height: 50vh;
            width: 100%; 
            height: auto;
            display: block;
        }
        .screen { display: none; }
        .active { display: block; }
        h1 { margin: 0 0 15px 0; text-shadow: 0 0 10px lime; font-size: 22px; }
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 6px; 
            margin: 15px 0; 
        }
        button { 
            padding: 4px 6px;
            font-size: 9px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            color: black; 
            transition: 0.2s; 
            white-space: nowrap;
            line-height: 1.1;
            min-height: 22px;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        select, input[type="color"] { 
            width: 100%; 
            padding: 4px; 
            background: #222; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px;
        }
        label { 
            font-size: 8px; 
            color: #aaa; 
            display: block; 
            margin-bottom: 3px; 
            text-align: left; 
            text-transform: uppercase; 
        }
        .score-box { display: flex; justify-content: space-around; margin: 10px 0; }
        .full-width { grid-column: span 3; }
        #pauseScreen {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }
        #pauseScreenInner {
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            padding: 20px 25px;
            border: 1px solid #444;
            min-width: 260px;
        }
        #pauseScreen h2 { margin: 0 0 15px; font-size: 20px; }
        #pauseScreen p { margin: 0 0 15px; font-size: 12px; color: #aaa; }
        #pauseButtons { display: grid; gap: 8px; }
        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            max-height: 140px;
            overflow-y: auto;
            padding: 5px 0;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }
        .mode-buttons::-webkit-scrollbar {
            width: 4px;
        }
        .mode-buttons::-webkit-scrollbar-track {
            background: transparent;
        }
        .mode-buttons::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 2px;
        }
        /* Unique colors for each game mode */
        #normal { background: lime; }
        #endless { background: #00d4ff; }
        #survival { background: #ff3131; color: white; }
        #slither { background: #ff8800; color: white; }
        #roulette { background: #ff00ff; }
        #multi { background: #ffcc00; }
        #three { background: #8800ff; color: white; }
        #winScreen h1 { color: lime; text-shadow: 0 0 20px lime; }
        h3 { font-size: 16px; margin: 5px 0; }
    </style>
</head>
<body>
<div id="ui-container">
    <div id="menu" class="screen active">
        <h1>🐍 NEON SNAKE</h1>
        <div class="controls">
            <div><label>P1 Color</label><input type="color" id="p1Color" value="#00FF00"></div>
            <div><label>P2 Color</label><input type="color" id="p2Color" value="#00d4ff"></div>
            <div><label>P3 Color</label><input type="color" id="p3Color" value="#ffcc00"></div>
            <div class="full-width"><label>Enemy Color</label><input type="color" id="enemyColor" value="#FF3131"></div>
            <div class="full-width">
                <label>Speed</label>
                <select id="difficulty">
                    <option value="150">Chill</option>
                    <option value="100" selected>Standard</option>
                    <option value="60">Insane</option>
                </select>
            </div>
        </div>
        <div class="mode-buttons">
            <button id="normal">NORMAL</button>
            <button id="endless">ENDLESS</button>
            <button id="survival">SURVIVAL</button>
            <button id="slither">SLITHER</button>
            <button id="roulette">CHAOS</button>
            <button id="multi">2P NO WALLS</button>
            <button id="three">3P CHAOS</button>
        </div>
        <p id="coinText" style="font-size: 11px; margin: 8px 0; color: #ffd700;">COINS: 0</p>
        <button id="hatToggle" style="font-size:8px;padding:4px;">FEDORA (10)</button>
        <button id="goldToggle" style="font-size:8px;padding:4px;background:#ffd700;color:black;">GOLD (5)</button>
        <p style="font-size: 11px; margin: 8px 0; color: #777;">BEST: <span id="bestScore">0</span></p>
    </div>


    <div id="gameScreen" class="screen" style="position: relative;">
        <canvas id="game" width="400" height="400"></canvas>
        <div class="score-box">
            <h3>SCORE: <span id="score">0</span></h3>
            <h3>BEST: <span id="bestInGame">0</span></h3>
        </div>
        <p style="font-size: 11px; margin: 5px 0; color: #777;">ESC = Pause</p>
        <div id="pauseScreen">
            <div id="pauseScreenInner">
                <h2>Paused</h2>
                <p>ESC or Resume to continue</p>
                <div id="pauseButtons">
                    <button id="resumeBtn" style="background:#00d4ff;color:black;">RESUME</button>
                    <button id="pauseMenuBtn" style="background:#555; color:white;">MENU</button>
                </div>
            </div>
        </div>
    </div>


    <div id="gameOverScreen" class="screen">
        <h1 style="color: #ff3131;">GAME OVER</h1>
        <p id="finalScore"></p>
        <button id="restart">PLAY AGAIN</button>
        <button id="menuBtn" style="background: #555; color: white;">MAIN MENU</button>
    </div>


    <div id="winScreen" class="screen">
        <h1 id="winnerText">PLAYER 1 WINS! 🏆</h1>
        <p id="winScore"></p>
        <button id="playAgainWin">PLAY AGAIN</button>
        <button id="menuBtnWin" style="background: #555; color: white;">MAIN MENU</button>
    </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function(){
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const bestDisplay = document.getElementById("bestScore");
    const inGameBest = document.getElementById("bestInGame");
    const coinText = document.getElementById("coinText");
    const hatToggle = document.getElementById("hatToggle");
    const goldToggle = document.getElementById("goldToggle");
    const p1CP = document.getElementById("p1Color");
    const difficulty = document.getElementById("difficulty");
    const pauseScreen = document.getElementById("pauseScreen");


    const box = 20, size = 400;


    let snake = [];
    let direction = "RIGHT";
    let moveQueue = [];
    let food;
    let score = 0;
    let mode = "normal";
    let speed = 100;
    let running = false;
    let gameTimeout;
    let paused = false;


    let coins = parseInt(localStorage.getItem("neonSnakeCoins") || "0");
    let accessories = JSON.parse(localStorage.getItem("neonSnakeAccessories") || "{}");
    let highScore = parseInt(localStorage.getItem("neonSnakeBest") || "0");


    if (!accessories.fedora) accessories.fedora = false;
    if (!accessories.gold) accessories.gold = false;


    coinText.innerText = "COINS: " + coins;
    bestDisplay.innerText = highScore;
    updateHatButton();
    updateGoldButton();


    function saveAccessories() {
        localStorage.setItem("neonSnakeAccessories", JSON.stringify(accessories));
    }


    function syncAccessoryFlags() {
        return {
            fedora: !!accessories.fedora,
            gold: !!accessories.gold
        };
    }


    function updateHatButton() {
        const flags = syncAccessoryFlags();
        if (flags.fedora) {
            hatToggle.innerText = "FEDORA ON ✓";
            hatToggle.style.background = "#ffd700";
        } else {
            hatToggle.innerText = "FEDORA (10)";
            hatToggle.style.background = "#ff00ff";
        }
    }


    function updateGoldButton() {
        const flags = syncAccessoryFlags();
        if (flags.gold) {
            goldToggle.innerText = "GOLD ON ✓";
            goldToggle.style.background = "#ffd700";
            goldToggle.style.color = "black";
        } else {
            goldToggle.innerText = "GOLD (5)";
            goldToggle.style.background = "#daa520";
            goldToggle.style.color = "black";
        }
    }


    function addCoins(amount){
        coins = Math.min(999, coins + amount);
        localStorage.setItem("neonSnakeCoins", coins);
        coinText.innerText = "COINS: " + coins;
    }


    hatToggle.onclick = () => {
        const flags = syncAccessoryFlags();
        if (flags.fedora) {
            accessories.fedora = false;
        } else {
            if (coins >= 10) {
                coins -= 10;
                localStorage.setItem("neonSnakeCoins", coins);
                coinText.innerText = "COINS: " + coins;
                accessories.fedora = true;
            } else {
                alert("Need 10 coins!");
                return;
            }
        }
        saveAccessories();
        updateHatButton();
    };


    goldToggle.onclick = () => {
        const flags = syncAccessoryFlags();
        if (flags.gold) {
            accessories.gold = false;
        } else {
            if (coins >= 5) {
                coins -= 5;
                localStorage.setItem("neonSnakeCoins", coins);
                coinText.innerText = "COINS: " + coins;
                accessories.gold = true;
            } else {
                alert("Need 5 coins!");
                return;
            }
        }
        saveAccessories();
        updateGoldButton();
    };


    // ===== UI helpers =====
    function showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }


    function hidePauseScreen() {
        pauseScreen.style.display = "none";
    }


    function showPauseScreen() {
        pauseScreen.style.display = "flex";
    }


    function backToMenu() {
        running = false;
        paused = false;
        if (gameTimeout) clearTimeout(gameTimeout);
        showScreen("menu");
    }


    // ===== Game setup =====
    function resetGame() {
        snake = [];
        const startX = Math.floor(size / (2*box)) * box;
        const startY = Math.floor(size / (2*box)) * box;
        snake.push({x: startX, y: startY});
        direction = "RIGHT";
        moveQueue = [];
        score = 0;
        scoreDisplay.textContent = score;
        inGameBest.textContent = highScore;
        spawnFood();
    }


    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * (size/box)) * box,
            y: Math.floor(Math.random() * (size/box)) * box
        };
    }


    function drawRect(x, y, color, isHead=false) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, box, box);
        if (isHead) {
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.strokeRect(x+2, y+2, box-4, box-4);
        }
    }


    function adjustBrightness(hex, factor) {
        const num = parseInt(hex.slice(1), 16);
        let r = (num >> 16) & 255;
        let g = (num >> 8) & 255;
        let b = num & 255;
        r = Math.min(255, Math.floor(r * factor));
        g = Math.min(255, Math.floor(g * factor));
        b = Math.min(255, Math.floor(b * factor));
        return "#" + (r.toString(16).padStart(2,"0") + g.toString(16).padStart(2,"0") + b.toString(16).padStart(2,"0"));
    }


    function drawGoldCell(x, y, alpha = 1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.shadowColor = "#FFD700";
        ctx.shadowBlur = 20 * alpha;
        const pad = 2;
        const w = box - pad * 2;
        const h = box - pad * 2;


        const gradient = ctx.createRadialGradient(x + box/2, y + box/2, 0, x + box/2, y + box/2, box/2);
        gradient.addColorStop(0, `rgba(255, 215, 0, ${alpha})`);
        gradient.addColorStop(0.7, `rgba(255, 223, 0, ${alpha * 0.8})`);
        gradient.addColorStop(1, `rgba(184, 134, 11, ${alpha * 0.5})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(x + pad, y + pad, w, h);


        ctx.shadowBlur = 0;
        ctx.restore();
    }


    function drawSnake(snakeArray, color) {
        const flags = syncAccessoryFlags();
        const useGold = flags.gold;


        for(let i = 1; i < snakeArray.length; i++) {
            const alpha = Math.max(0.2, 1 - (i * 0.03));
            if (useGold) {
                drawGoldCell(snakeArray[i].x, snakeArray[i].y, alpha);
            } else {
                const trailColor = adjustBrightness(color, 0.3 + (alpha * 0.7));
                ctx.save(); 
                ctx.globalAlpha = alpha; 
                ctx.shadowColor = trailColor; 
                ctx.shadowBlur = 10 * alpha;
                drawRect(snakeArray[i].x, snakeArray[i].y, trailColor); 
                ctx.restore();
            }
        }


        if (snakeArray.length > 0) {
            const head = snakeArray[0];


            if (flags.fedora) {
                ctx.save(); 
                ctx.shadowColor = "#FFFFFF"; 
                ctx.shadowBlur = 25;
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(head.x + 2, head.y - 6, box - 4, 4);
                ctx.fillRect(head.x + 3, head.y - 8, box - 6, 3);
                ctx.shadowBlur = 0; 
                ctx.restore();
            }


            if (useGold) {
                drawGoldCell(head.x, head.y, 1);
            } else {
                ctx.shadowColor = color; 
                ctx.shadowBlur = 20;
                drawRect(head.x, head.y, color, true);
            }
        }
    }


    function checkCollision(head, arr) {
        for (let i = 0; i < arr.length; i++) {
            if (head.x === arr[i].x && head.y === arr[i].y) return true;
        }
        return false;
    }


    function gameOver() {
        running = false;
        if (gameTimeout) clearTimeout(gameTimeout);


        document.getElementById("finalScore").innerText = "SCORE: " + score;
        showScreen("gameOverScreen");


        if (score > highScore) {
            highScore = score;
            localStorage.setItem("neonSnakeBest", highScore);
            bestDisplay.innerText = highScore;
        }


        addCoins(1); // Small coin reward
    }


    function gameLoop() {
        if (!running || paused) return;


        ctx.clearRect(0,0,size,size);


        if (moveQueue.length) {
            direction = moveQueue.shift();
        }


        let head = {x: snake[0].x, y: snake[0].y};


        if (direction === "LEFT") head.x -= box;
        if (direction === "RIGHT") head.x += box;
        if (direction === "UP") head.y -= box;
        if (direction === "DOWN") head.y += box;


        // walls
        if (head.x < 0 || head.y < 0 || head.x >= size || head.y >= size || checkCollision(head, snake)) {
            gameOver();
            return;
        }


        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreDisplay.textContent = score;
            spawnFood();
        } else {
            snake.pop();
        }


        snake.unshift(head);


        // draw food
        ctx.fillStyle = "#ff3131";
        ctx.shadowColor = "#ff3131";
        ctx.shadowBlur = 15;
        ctx.fillRect(food.x, food.y, box, box);
        ctx.shadowBlur = 0;


        // draw snake
        drawSnake(snake, p1CP.value || "#00FF00");


        gameTimeout = setTimeout(gameLoop, speed);
    }


    function startGame(selectedMode) {
        mode = selectedMode || "normal";
        speed = parseInt(difficulty.value, 10) || 100;
        resetGame();
        showScreen("gameScreen");
        hidePauseScreen();
        paused = false;
        running = true;
        gameLoop();
    }


    function togglePause() {
        if (!running) return;
        paused = !paused;
        if (paused) {
            showPauseScreen();
        } else {
            hidePauseScreen();
            gameLoop();
        }
    }


    // ===== Event wiring =====
    document.getElementById("normal").onclick = () => startGame("normal");
    document.getElementById("endless").onclick = () => startGame("endless");
    document.getElementById("survival").onclick = () => startGame("survival");
    document.getElementById("slither").onclick = () => startGame("slither");
    document.getElementById("roulette").onclick = () => startGame("chaos");
    document.getElementById("multi").onclick = () => startGame("multiplayer");
    document.getElementById("three").onclick = () => startGame("threePlayer");


    document.getElementById("restart").onclick = () => startGame(mode);
    document.getElementById("playAgainWin").onclick = () => startGame(mode);
    document.getElementById("menuBtn").onclick = backToMenu;
    document.getElementById("menuBtnWin").onclick = backToMenu;
    document.getElementById("resumeBtn").onclick = () => { if (paused) togglePause(); };
    document.getElementById("pauseMenuBtn").onclick = () => {
        running = false; paused = false; if (gameTimeout) clearTimeout(gameTimeout);
        hidePauseScreen(); backToMenu();
    };


    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            togglePause();
            return;
        }
        let dir = direction;
        if (e.key === "ArrowLeft" && direction !== "RIGHT") dir = "LEFT";
        if (e.key === "ArrowRight" && direction !== "LEFT") dir = "RIGHT";
        if (e.key === "ArrowUp" && direction !== "DOWN") dir = "UP";
        if (e.key === "ArrowDown" && direction !== "UP") dir = "DOWN";


        if (dir !== direction) {
            moveQueue.push(dir);
        }
    });
});
</script>
</body>
</html>
