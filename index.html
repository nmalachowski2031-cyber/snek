<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Ultimate Custom Grid</title>
    <style>
        body { 
            background: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: sans-serif; 
            flex-direction: column; 
            padding: 10px;
        }
        #ui-container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            backdrop-filter: blur(10px); 
            width: 90vw; 
            max-width: 400px;
            max-height: 95vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        canvas { 
            background: #000; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); 
            border: 3px solid lime; 
            border-radius: 5px;
            max-width: 100%;
            max-height: 50vh;
            width: 100%; 
            height: auto;
            display: block;
        }
        .screen { display: none; }
        .active { display: block; }
        h1 { margin: 0 0 15px 0; text-shadow: 0 0 10px lime; font-size: 22px; }
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 6px; 
            margin: 15px 0; 
        }
        button { 
            padding: 6px 8px; 
            font-size: 11px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            background: lime; 
            color: black; 
            transition: 0.2s; 
            white-space: nowrap;
            line-height: 1.2;
            min-height: 28px;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        select, input[type="color"] { 
            width: 100%; 
            padding: 4px; 
            background: #222; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px;
        }
        label { 
            font-size: 8px; 
            color: #aaa; 
            display: block; 
            margin-bottom: 3px; 
            text-align: left; 
            text-transform: uppercase; 
        }
        .score-box { display: flex; justify-content: space-around; margin: 10px 0; }
        .full-width { grid-column: span 3; }
        #pauseScreen {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }
        #pauseScreenInner {
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            padding: 20px 25px;
            border: 1px solid #444;
            min-width: 260px;
        }
        #pauseScreen h2 { margin: 0 0 15px; font-size: 20px; }
        #pauseScreen p { margin: 0 0 15px; font-size: 12px; color: #aaa; }
        #pauseButtons { display: grid; gap: 8px; }
        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
            padding: 5px 0;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }
        .mode-buttons::-webkit-scrollbar {
            width: 4px;
        }
        .mode-buttons::-webkit-scrollbar-track {
            background: transparent;
        }
        .mode-buttons::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 2px;
        }
        #winScreen h1 { color: lime; text-shadow: 0 0 20px lime; }
        h3 { font-size: 16px; margin: 5px 0; }
    </style>
</head>
<body>
<div id="ui-container">
    <div id="menu" class="screen active">
        <h1>🐍 NEON SNAKE</h1>
        <div class="controls">
            <div><label>P1 Color</label><input type="color" id="p1Color" value="#00FF00"></div>
            <div><label>P2 Color</label><input type="color" id="p2Color" value="#00d4ff"></div>
            <div><label>P3 Color</label><input type="color" id="p3Color" value="#ffcc00"></div>
            <div class="full-width"><label>Enemy Color</label><input type="color" id="enemyColor" value="#FF3131"></div>
            <div class="full-width">
                <label>Speed</label>
                <select id="difficulty">
                    <option value="150">Chill</option>
                    <option value="100" selected>Standard</option>
                    <option value="60">Insane</option>
                </select>
            </div>
        </div>
        <div class="mode-buttons">
            <button id="normal">NORMAL</button>
            <button id="endless" style="background: #00d4ff; color: black;">ENDLESS</button>
            <button id="survival" style="background: #ff3131; color: white;">SURVIVAL</button>
            <button id="slither" style="background: #ff8800; color: white;">SLITHER</button>
            <button id="roulette" style="background: #ff00ff; color: black;">CHAOS</button>
            <button id="multi" style="background: #ffcc00; color: black;">2P NO WALLS</button>
            <button id="three" style="background: #ff8800; color: black;">3P CHAOS</button>
        </div>
        <p id="coinText" style="font-size: 11px; margin: 8px 0; color: #ffd700;">COINS: 0</p>
        <button id="hatToggle" style="font-size:10px;padding:5px;">TOP HAT (10 COINS)</button>
        <p style="font-size: 11px; margin: 8px 0; color: #777;">BEST: <span id="bestScore">0</span></p>
    </div>


    <div id="gameScreen" class="screen" style="position: relative;">
        <canvas id="game" width="400" height="400"></canvas>
        <div class="score-box">
            <h3>SCORE: <span id="score">0</span></h3>
            <h3>BEST: <span id="bestInGame">0</span></h3>
        </div>
        <p style="font-size: 11px; margin: 5px 0; color: #777;">ESC = Pause</p>
        <div id="pauseScreen">
            <div id="pauseScreenInner">
                <h2>Paused</h2>
                <p>ESC or Resume to continue</p>
                <div id="pauseButtons">
                    <button id="resumeBtn" style="background:#00d4ff;color:black;">RESUME</button>
                    <button id="pauseMenuBtn" style="background:#555; color:white;">MENU</button>
                </div>
            </div>
        </div>
    </div>


    <div id="gameOverScreen" class="screen">
        <h1 style="color: #ff3131;">GAME OVER</h1>
        <p id="finalScore"></p>
        <button id="restart">PLAY AGAIN</button>
        <button id="menuBtn" style="background: #555; color: white;">MAIN MENU</button>
    </div>


    <div id="winScreen" class="screen">
        <h1 id="winnerText">PLAYER 1 WINS! 🏆</h1>
        <p id="winScore"></p>
        <button id="playAgainWin">PLAY AGAIN</button>
        <button id="menuBtnWin" style="background: #555; color: white;">MAIN MENU</button>
    </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function(){
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const bestDisplay = document.getElementById("bestScore");
    const inGameBest = document.getElementById("bestInGame");
    const coinText = document.getElementById("coinText");
    const hatToggle = document.getElementById("hatToggle");
    const p1CP = document.getElementById("p1Color");
    const p2CP = document.getElementById("p2Color");
    const p3CP = document.getElementById("p3Color");
    const enemyCP = document.getElementById("enemyColor");
    const difficulty = document.getElementById("difficulty");
    const pauseScreen = document.getElementById("pauseScreen");


    const box = 20, size = 400;  // Reduced from 30/600 to 20/400
    let snake, snake2, snake3, npcSnake;
    let direction = "RIGHT", direction2 = "RIGHT", direction3 = "RIGHT";
    let moveQueue = [], moveQueue2 = [], moveQueue3 = [];
    let food, enemyFood, score = 0, mode, speed, running = false, gameTimeout;
    let paused = false;
    let alive1 = true, alive2 = false, alive3 = false;
    let coins = parseInt(localStorage.getItem("neonSnakeCoins") || "0");
    let equipTopHat = localStorage.getItem("neonSnakeTopHat") === "true";
    let highScore = parseInt(localStorage.getItem("neonSnakeBest") || "0");
    let winner = "";


    coinText.innerText = "COINS: " + coins;
    bestDisplay.innerText = highScore;
    updateHatButton();


    function updateHatButton() {
        if (equipTopHat) {
            hatToggle.innerText = "HAT ON ✓";
            hatToggle.style.background = "#ffd700";
        } else {
            hatToggle.innerText = "TOP HAT (10)";
            hatToggle.style.background = "#ff00ff";
        }
    }


    function addCoins(amount){
        coins = Math.min(999, coins + amount);
        localStorage.setItem("neonSnakeCoins", coins);
        coinText.innerText = "COINS: " + coins;
    }


    hatToggle.onclick = () => {
        if (equipTopHat) {
            equipTopHat = false;
        } else {
            if (coins >= 10) {
                coins -= 10;
                localStorage.setItem("neonSnakeCoins", coins);
                coinText.innerText = "COINS: " + coins;
                equipTopHat = true;
            } else {
                alert("Need 10 coins!");
                return;
            }
        }
        localStorage.setItem("neonSnakeTopHat", equipTopHat);
        updateHatButton();
    };


    document.getElementById("normal").onclick = () => startGame("normal");
    document.getElementById("endless").onclick = () => startGame("endless");
    document.getElementById("survival").onclick = () => startGame("survival");
    document.getElementById("slither").onclick = () => startGame("slither");
    document.getElementById("roulette").onclick = () => startGame("chaos");
    document.getElementById("multi").onclick = () => startGame("multiplayer");
    document.getElementById("three").onclick = () => startGame("threePlayer");
    document.getElementById("restart").onclick = () => startGame(mode);
    document.getElementById("playAgainWin").onclick = () => startGame(mode);
    document.getElementById("menuBtn").onclick = backToMenu;
    document.getElementById("menuBtnWin").onclick = backToMenu;
    document.getElementById("resumeBtn").onclick = () => { if (paused) togglePause(); };
    document.getElementById("pauseMenuBtn").onclick = () => {
        running = false; paused = false; if (gameTimeout) clearTimeout(gameTimeout);
        hidePauseScreen(); backToMenu();
    };


    function showScreen(id){
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }


    function showPauseScreen() { pauseScreen.style.display = "flex"; }
    function hidePauseScreen() { pauseScreen.style.display = "none"; }
    function backToMenu(){ showScreen("menu"); if(gameTimeout) clearTimeout(gameTimeout); running = false; paused = false; hidePauseScreen(); }


    function startGame(selectedMode){
        if(gameTimeout) clearTimeout(gameTimeout);
        mode = selectedMode;
        speed = mode === "chaos" ? 60 : parseInt(difficulty.value);
        score = 0; running = true; paused = false; hidePauseScreen();
        winner = "";


        snake = [{x: 8*box, y: 8*box}]; direction = "RIGHT"; moveQueue = [];  // Adjusted spawn positions
        snake2 = null; snake3 = null; npcSnake = null; enemyFood = null;
        moveQueue2 = []; moveQueue3 = [];
        alive1 = true; alive2 = false; alive3 = false;


        if(mode === "multiplayer" || mode === "chaos" || mode === "threePlayer" || mode === "slither") {
            snake2 = [{x: 5*box, y: 5*box}]; direction2 = "RIGHT"; alive2 = true;
        }
        if(mode === "threePlayer" || mode === "chaos") {
            snake3 = [{x: 11*box, y: 11*box}]; direction3 = "RIGHT"; alive3 = true;
        }
        if(mode === "survival") {
            npcSnake = [{x: box, y: 15*box}]; enemyFood = {x: 15*box, y: box};
        } else if(mode === "chaos") {
            npcSnake = [{x: box, y: box}]; enemyFood = spawnFood();
        }
        food = spawnFood();


        scoreDisplay.innerText = score; inGameBest.innerText = highScore;
        showScreen("gameScreen");
        gameLoop();
    }


    function spawnFood(){
        let newFood;
        do {
            newFood = { x: Math.floor(Math.random() * (size / box)) * box, y: Math.floor(Math.random() * (size / box)) * box };
        } while (snake && snake.some(s => s.x === newFood.x && s.y === newFood.y));
        return newFood;
    }


    function drawRect(x, y, color, glow = true) {
        ctx.fillStyle = color;
        if (glow) { ctx.shadowColor = color; ctx.shadowBlur = 15; }
        ctx.fillRect(x + 2, y + 2, box - 4, box - 4);
        ctx.shadowBlur = 0;
    }


    function drawSnake(snakeArray, color) {
        for(let i = 1; i < snakeArray.length; i++) {
            const alpha = Math.max(0.2, 1 - (i * 0.03));
            const trailColor = adjustBrightness(color, 0.3 + (alpha * 0.7));
            ctx.save(); ctx.globalAlpha = alpha; ctx.shadowColor = trailColor; ctx.shadowBlur = 10 * alpha;
            drawRect(snakeArray[i].x, snakeArray[i].y, trailColor); ctx.restore();
        }
        if (snakeArray.length > 0) {
            const head = snakeArray;
            if (equipTopHat) {
                ctx.save(); ctx.shadowColor = "#FFFFFF"; ctx.shadowBlur = 25;
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(head.x + 2, head.y - 6, box - 4, 4);
                ctx.fillRect(head.x + 3, head.y - 8, box - 6, 3);
                ctx.shadowBlur = 0; ctx.restore();
            }
            ctx.shadowColor = color; ctx.shadowBlur = 20;
            drawRect(head.x, head.y, color, true);
        }
    }


    function adjustBrightness(color, factor) {
        const hex = color.replace("#", "");
        const r = Math.floor(parseInt(hex.substr(0, 2), 16) * factor);
        const g = Math.floor(parseInt(hex.substr(2, 2), 16) * factor);
        const b = Math.floor(parseInt(hex.substr(4, 2), 16) * factor);
        return `rgb(${r},${g},${b})`;
    }


    function togglePause() {
        if (!running) return;
        paused = !paused;
        if (paused) { clearTimeout(gameTimeout); showPauseScreen(); } 
        else { hidePauseScreen(); gameLoop(); }
    }


    document.addEventListener("keydown", e => {
        if (e.key === "Escape") { e.preventDefault(); togglePause(); return; }
        if(!running || paused) return;


        const key = e.key;
        const lastDir = moveQueue.length ? moveQueue[moveQueue.length - 1] : direction;
        if(key === "ArrowLeft" && lastDir !== "RIGHT") moveQueue.push("LEFT");
        if(key === "ArrowRight" && lastDir !== "LEFT") moveQueue.push("RIGHT");
        if(key === "ArrowUp" && lastDir !== "DOWN") moveQueue.push("UP");
        if(key === "ArrowDown" && lastDir !== "UP") moveQueue.push("DOWN");


        if(snake2 && alive2){
            const k = key.toLowerCase();
            const lastDir2 = moveQueue2.length ? moveQueue2[moveQueue2.length - 1] : direction2;
            if(k === "a" && lastDir2 !== "RIGHT") moveQueue2.push("LEFT");
            if(k === "d" && lastDir2 !== "LEFT") moveQueue2.push("RIGHT");
            if(k === "w" && lastDir2 !== "DOWN") moveQueue2.push("UP");
            if(k === "s" && lastDir2 !== "UP") moveQueue2.push("DOWN");
        }


        if(snake3 && alive3){
            const k3 = key.toLowerCase();
            const lastDir3 = moveQueue3.length ? moveQueue3[moveQueue3.length - 1] : direction3;
            if(k3 === "j" && lastDir3 !== "RIGHT") moveQueue3.push("LEFT");
            if(k3 === "l" && lastDir3 !== "LEFT") moveQueue3.push("RIGHT");
            if(k3 === "i" && lastDir3 !== "DOWN") moveQueue3.push("UP");
            if(k3 === "k" && lastDir3 !== "UP") moveQueue3.push("DOWN");
        }
    });


    function wrap(pos) {
        if(pos.x < 0) pos.x = size - box;
        else if(pos.x >= size) pos.x = 0;
        if(pos.y < 0) pos.y = size - box;
        else if(pos.y >= size) pos.y = 0;
    }


    function gameLoop() {
        if (!running || paused) return;
        updateLogic();
        draw();
        gameTimeout = setTimeout(gameLoop, speed);
    }


    function handleScoreAndFood() {
        score++; scoreDisplay.innerText = score;
        if(score > highScore) {
            highScore = score; localStorage.setItem("neonSnakeBest", highScore);
            bestDisplay.innerText = highScore; inGameBest.innerText = highScore;
        }
        if (score % 3 === 0) addCoins(1);
        food = spawnFood();
        if(mode === "chaos") speed = 60;
    }


    function handlePlayerDeath(playerIndex, killerIndex = null) {
        if (playerIndex === 1 && alive1) { alive1 = false; snake = []; }
        if (playerIndex === 2 && alive2) { alive2 = false; snake2 = null; }
        if (playerIndex === 3 && alive3) { alive3 = false; snake3 = null; }


        if (mode === "slither") {
            if (playerIndex === 1 && alive2) {
                winner = "PLAYER 2 WINS! 🏆";
            } else if (playerIndex === 2 && alive1) {
                winner = "PLAYER 1 WINS! 🏆";
            }
            if (winner) {
                document.getElementById("winnerText").innerText = winner;
                document.getElementById("winScore").innerText = `SCORE: ${score}`;
                showScreen("winScreen");
                running = false;
                return;
            }
        }


        if (mode === "normal" || mode === "endless" || mode === "survival" || mode === "slither") gameOver();
        else if (!alive1 && !alive2 && !alive3) gameOver();
    }


    function gameOver() {
        running = false;
        document.getElementById("finalScore").innerText = `FINAL SCORE: ${score}`;
        showScreen("gameOverScreen");
    }


    function updateLogic() {
        const hasWalls = (mode === "normal" || mode === "survival" || mode === "slither");


        if (alive1 && snake && snake.length > 0) {
            if(moveQueue.length > 0) direction = moveQueue.shift();
            let head = { x: snake[0].x, y: snake[0].y };
            if(direction === "LEFT") head.x -= box;
            else if(direction === "RIGHT") head.x += box;
            else if(direction === "UP") head.y -= box;
            else if(direction === "DOWN") head.y += box;


            if (hasWalls && (head.x < 0 || head.y < 0 || head.x >= size || head.y >= size)) {
                handlePlayerDeath(1); return;
            }
            if (!hasWalls) wrap(head);


            if(snake.some(s => s.x === head.x && s.y === head.y)) { handlePlayerDeath(1); return; }
            if(npcSnake && npcSnake.some(s => s.x === head.x && s.y === head.y)) { handlePlayerDeath(1); return; }
            if(snake2 && snake2.some(s => s.x === head.x && s.y === head.y)) { 
                handlePlayerDeath(2, 1); 
                return; 
            }
            if(snake3 && snake3.some(s => s.x === head.x && s.y === head.y)) { handlePlayerDeath(3, 1); return; }


            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) handleScoreAndFood();
            else snake.pop();
        }


        if(snake2 && alive2) {
            if(moveQueue2.length > 0) direction2 = moveQueue2.shift();
            let h2 = { x: snake2[0].x, y: snake2[0].y };
            if(direction2 === "LEFT") h2.x -= box;
            else if(direction2 === "RIGHT") h2.x += box;
            else if(direction2 === "UP") h2.y -= box;
            else if(direction2 === "DOWN") h2.y += box;


            if (hasWalls && (h2.x < 0 || h2.y < 0 || h2.x >= size || h2.y >= size)) {
                handlePlayerDeath(2); return;
            }
            if (!hasWalls) wrap(h2);


            if(snake2.some(s => s.x === h2.x && s.y === h2.y)) { handlePlayerDeath(2); return; }
            if(snake && snake.some(s => s.x === h2.x && s.y === h2.y)) { 
                handlePlayerDeath(1, 2); 
                return; 
            }
            if(snake3 && snake3.some(s => s.x === h2.x && s.y === h2.y)) { handlePlayerDeath(3, 2); return; }
            if(npcSnake && npcSnake.some(s => s.x === h2.x && s.y === h2.y)) { handlePlayerDeath(2); return; }


            snake2.unshift(h2);
            if(h2.x === food.x && h2.y === food.y) handleScoreAndFood();
            else snake2.pop();
        }


        if(snake3 && alive3) {
            if(moveQueue3.length > 0) direction3 = moveQueue3.shift();
            let h3 = { x: snake3[0].x, y: snake3[0].y };
            if(direction3 === "LEFT") h3.x -= box;
            else if(direction3 === "RIGHT") h3.x += box;
            else if(direction3 === "UP") h3.y -= box;
            else if(direction3 === "DOWN") h3.y += box;


            if (hasWalls && (h3.x < 0 || h3.y < 0 || h3.x >= size || h3.y >= size)) {
                handlePlayerDeath(3); return;
            }
            if (!hasWalls) wrap(h3);


            if(snake3.some(s => s.x === h3.x && s.y === h3.y)) { handlePlayerDeath(3); return; }
            if(snake && snake.some(s => s.x === h3.x && s.y === h3.y)) { handlePlayerDeath(1, 3); return; }
            if(snake2 && snake2.some(s => s.x === h3.x && s.y === h3.y)) { handlePlayerDeath(2, 3); return; }
            if(npcSnake && npcSnake.some(s => s.x === h3.x && s.y === h3.y)) { handlePlayerDeath(3); return; }


            snake3.unshift(h3);
            if(h3.x === food.x && h3.y === food.y) handleScoreAndFood();
            else snake3.pop();
        }


        if(npcSnake && (mode === "survival" || mode === "chaos")) {
            let nh = { x: npcSnake[0].x, y: npcSnake[0].y };
            if (mode === "survival" && snake && snake.length > 0) {
                if (Math.abs(nh.x - snake[0].x) > Math.abs(nh.y - snake[0].y)) {
                    nh.x < snake[0].x ? nh.x += box : nh.x -= box;
                } else {
                    nh.y < snake[0].y ? nh.y += box : nh.y -= box;
                }
            } else {
                const dirs = ["LEFT", "RIGHT", "UP", "DOWN"][Math.floor(Math.random() * 4)];
                if(dirs === "LEFT") nh.x -= box; else if(dirs === "RIGHT") nh.x += box;
                else if(dirs === "UP") nh.y -= box; else nh.y += box;
            }


            if (hasWalls && (nh.x < 0 || nh.y < 0 || nh.x >= size || nh.y >= size)) {
                npcSnake = []; return;
            }
            if (!hasWalls) wrap(nh);
            if(npcSnake.some(s => s.x === nh.x && s.y === nh.y)) { npcSnake = []; return; }


            npcSnake.unshift(nh);
            if(nh.x === enemyFood.x && nh.y === enemyFood.y) enemyFood = spawnFood();
            else npcSnake.pop();
        }
    }


    function draw() {
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, size, size);
        drawRect(food.x, food.y, "#FF0000", true);
        if(enemyFood) drawRect(enemyFood.x, enemyFood.y, enemyCP.value, true);


        if(alive1 && snake) drawSnake(snake, p1CP.value);
        if(alive2 && snake2) drawSnake(snake2, p2CP.value);
        if(alive3 && snake3) drawSnake(snake3, p3CP.value);
        if(npcSnake) drawSnake(npcSnake, enemyCP.value);
    }
});
</script>
</body>
</html>
