<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Classic Grid Edition</title>
    <style>
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; flex-direction: column; overflow: hidden; }
        #ui-container { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; border: 1px solid #333; backdrop-filter: blur(10px); }
        canvas { background: #000; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); border: 3px solid lime; border-radius: 5px; }
        .screen { display: none; }
        .active { display: block; }
        h1 { margin-top: 0; text-shadow: 0 0 10px lime; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        button { padding: 12px; font-size: 14px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: lime; color: black; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        select, input[type="color"] { width: 100%; padding: 8px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        label { font-size: 10px; color: #aaa; display: block; margin-bottom: 5px; text-align: left; text-transform: uppercase; }
        .score-box { display: flex; justify-content: space-around; margin: 10px 0; }
    </style>
</head>
<body>


<div id="ui-container">
    <div id="menu" class="screen active">
        <h1>🐍 NEON SNAKE</h1>
        <div class="controls">
            <div><label>Your Color</label><input type="color" id="snakeColor" value="#00FF00"></div>
            <div><label>Enemy/P2 Color</label><input type="color" id="enemyColor" value="#FF3131"></div>
            <div style="grid-column: span 2;"><label>Base Speed</label><select id="difficulty"><option value="150">Chill</option><option value="100" selected>Standard</option><option value="60">Insane</option></select></div>
        </div>
        <div style="display: grid; gap: 10px;">
            <button id="normal">NORMAL MODE</button>
            <button id="survival" style="background: #ff3131;">SURVIVAL MODE</button>
            <button id="roulette" style="background: #ff00ff;">CHAOS MODE</button>
            <button id="multi" style="background: #ffcc00;">2 PLAYER (W-A-S-D)</button>
        </div>
        <p style="font-size: 12px; margin-top: 15px; color: #777;">BEST SCORE: <span id="bestScore">0</span></p>
    </div>


    <div id="gameScreen" class="screen">
        <canvas id="game" width="400" height="400"></canvas>
        <div class="score-box">
            <h3>SCORE: <span id="score">0</span></h3>
            <h3>BEST: <span id="bestInGame">0</span></h3>
        </div>
    </div>


    <div id="gameOverScreen" class="screen">
        <h1 style="color: #ff3131;">GAME OVER</h1>
        <p id="finalScore"></p>
        <button id="restart">PLAY AGAIN</button>
        <button id="menuBtn" style="background: #555; color: white;">MAIN MENU</button>
    </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function(){
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const bestDisplay = document.getElementById("bestScore");
    const inGameBest = document.getElementById("bestInGame");
    const colorPicker = document.getElementById("snakeColor");
    const enemyColorPicker = document.getElementById("enemyColor");
    const difficulty = document.getElementById("difficulty");


    const box = 20, size = 400;
    let snake, snake2, npcSnake, direction, direction2, nextDir, nextDir2, food, enemyFood, score, mode, speed, running = false, gameTimeout;


    let highScore = localStorage.getItem("neonSnakeBest") || 0;
    bestDisplay.innerText = highScore;


    document.getElementById("normal").onclick = () => startGame("normal");
    document.getElementById("survival").onclick = () => startGame("survival");
    document.getElementById("roulette").onclick = () => startGame("chaos");
    document.getElementById("multi").onclick = () => startGame("multiplayer");
    document.getElementById("restart").onclick = () => startGame(mode);
    document.getElementById("menuBtn").onclick = backToMenu;


    function showScreen(id){
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }


    function startGame(selectedMode){
        if(gameTimeout) clearTimeout(gameTimeout);
        mode = selectedMode;
        speed = parseInt(difficulty.value);
        score = 0;
        running = true;
        
        snake = [{x: 200, y: 200}];
        direction = nextDir = "RIGHT";
        npcSnake = null; enemyFood = null; snake2 = null;


        if(mode === "multiplayer" || mode === "chaos"){
            snake2 = [{x: 100, y: 100}];
            direction2 = nextDir2 = "RIGHT";
        }
        if(mode === "survival" || mode === "chaos"){
            npcSnake = [{x: 0, y: 0}];
            enemyFood = spawnFood();
        }


        food = spawnFood();
        scoreDisplay.innerText = score;
        inGameBest.innerText = highScore;
        showScreen("gameScreen");
        gameLoop();
    }


    function spawnFood(){
        return { x: Math.floor(Math.random() * (size / box)) * box, y: Math.floor(Math.random() * (size / box)) * box };
    }


    document.addEventListener("keydown", e => {
        if(!running) return;
        const key = e.key;
        if(key === "ArrowLeft" && direction !== "RIGHT") nextDir = "LEFT";
        if(key === "ArrowRight" && direction !== "LEFT") nextDir = "RIGHT";
        if(key === "ArrowUp" && direction !== "DOWN") nextDir = "UP";
        if(key === "ArrowDown" && direction !== "UP") nextDir = "DOWN";


        if(snake2){
            const k = key.toLowerCase();
            if(k === "a" && direction2 !== "RIGHT") nextDir2 = "LEFT";
            if(k === "d" && direction2 !== "LEFT") nextDir2 = "RIGHT";
            if(k === "w" && direction2 !== "DOWN") nextDir2 = "UP";
            if(k === "s" && direction2 !== "UP") nextDir2 = "DOWN";
        }
    });


    function wrap(pos) {
        if(pos.x < 0) pos.x = size - box; else if(pos.x >= size) pos.x = 0;
        if(pos.y < 0) pos.y = size - box; else if(pos.y >= size) pos.y = 0;
    }


    function gameLoop() {
        if (!running) return;
        updateLogic();
        draw();
        gameTimeout = setTimeout(gameLoop, speed);
    }


    function updateLogic() {
        direction = nextDir;
        let head = { x: snake[0].x, y: snake[0].y };
        if(direction === "LEFT") head.x -= box;
        if(direction === "RIGHT") head.x += box;
        if(direction === "UP") head.y -= box;
        if(direction === "DOWN") head.y += box;


        if(mode === "chaos" || mode === "endless") wrap(head);
        else if (head.x < 0 || head.y < 0 || head.x >= size || head.y >= size) return gameOver();
        
        if(snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
        if(npcSnake && npcSnake.some(s => s.x === head.x && s.y === head.y)) return gameOver();


        snake.unshift(head);
        if(head.x === food.x && head.y === food.y){
            score++; scoreDisplay.innerText = score;
            if(score > highScore) { highScore = score; localStorage.setItem("neonSnakeBest", highScore); inGameBest.innerText = highScore; }
            food = spawnFood();
            if(mode === "chaos") speed = Math.max(40, Math.floor(Math.random() * 100) + 30);
        } else snake.pop();


        if(snake2){
            direction2 = nextDir2;
            let h2 = { x: snake2[0].x, y: snake2[0].y };
            if(direction2 === "LEFT") h2.x -= box; if(direction2 === "RIGHT") h2.x += box;
            if(direction2 === "UP") h2.y -= box; if(direction2 === "DOWN") h2.y += box;
            if(mode === "chaos") wrap(h2);
            if(h2.x < 0 || h2.y < 0 || h2.x >= size || h2.y >= size || snake2.some(s => s.x === h2.x && s.y === h2.y) || snake.some(s => s.x === h2.x && s.y === h2.y)) return gameOver();
            snake2.unshift(h2);
            if(h2.x === food.x && h2.y === food.y) food = spawnFood(); else snake2.pop();
        }


        if(npcSnake){
            let npcHead = { x: npcSnake[0].x, y: npcSnake[0].y };
            let target = (snake2 && Math.random() > 0.5) ? snake2[0] : snake[0];
            if(enemyFood && Math.random() < 0.2) target = enemyFood;
            if(Math.abs(target.x - npcHead.x) > Math.abs(target.y - npcHead.y)) npcHead.x += (target.x > npcHead.x) ? box : -box;
            else npcHead.y += (target.y > npcHead.y) ? box : -box;
            if(mode === "chaos") wrap(npcHead);
            npcSnake.unshift(npcHead);
            if(enemyFood && npcHead.x === enemyFood.x && npcHead.y === enemyFood.y) enemyFood = spawnFood(); else npcSnake.pop();
            if(npcHead.x === snake[0].x && npcHead.y === snake[0].y) gameOver();
            if(snake2 && npcHead.x === snake2[0].x && npcHead.y === snake2[0].y) gameOver();
        }
    }


    function draw() {
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);
        if(enemyFood) { ctx.fillStyle = "#ff00ff"; ctx.fillRect(enemyFood.x, enemyFood.y, box, box); }
        ctx.fillStyle = colorPicker.value; snake.forEach(s => ctx.fillRect(s.x + 1, s.y + 1, box - 2, box - 2));
        if(snake2){ ctx.fillStyle = enemyColorPicker.value; snake2.forEach(s => ctx.fillRect(s.x + 1, s.y + 1, box - 2, box - 2)); }
        if(npcSnake){ ctx.fillStyle = (mode === "chaos") ? "#ff00ff" : enemyColorPicker.value; npcSnake.forEach(s => ctx.fillRect(s.x + 1, s.y + 1, box - 2, box - 2)); }
    }


    function gameOver(){ running = false; document.getElementById("finalScore").innerText = "Final Score: " + score; showScreen("gameOverScreen"); }
    function backToMenu(){ running = false; bestDisplay.innerText = highScore; showScreen("menu"); }
});
</script>
</body>
</html>
