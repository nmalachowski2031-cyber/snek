<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Survival Edition</title>
    <style>
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; flex-direction: column; overflow: hidden; }
        #ui-container { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px; border: 1px solid #333; backdrop-filter: blur(10px); }
        canvas { background: #000; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); border: 3px solid lime; border-radius: 5px; }
        .screen { display: none; }
        .active { display: block; }
        h1 { margin-top: 0; text-shadow: 0 0 10px lime; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        button { padding: 12px; font-size: 14px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: lime; color: black; }
        button:hover { filter: brightness(1.2); }
        select, input[type="color"] { width: 100%; padding: 8px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px; text-align: left; }
    </style>
</head>
<body>


<div id="ui-container">
    <div id="menu" class="screen active">
        <h1>🐍 NEON SNAKE</h1>
        <div class="controls">
            <div><label>SNAKE COLOR</label><input type="color" id="snakeColor" value="#00FF00"></div>
            <div><label>SPEED</label><select id="difficulty"><option value="150">Chill</option><option value="100" selected>Standard</option><option value="60">Insane</option></select></div>
        </div>
        <div style="display: grid; gap: 10px;">
            <button id="normal">NORMAL MODE</button>
            <button id="endless" style="background: #00d4ff;">ENDLESS MODE</button>
            <button id="survival" style="background: #ff3131;">SURVIVAL MODE (CHASE)</button>
            <button id="roulette" style="background: #ff00ff;">ROULETTE (CHAOS)</button>
            <button id="multi" style="background: #ffcc00;">2 PLAYER (W-A-S-D)</button>
        </div>
    </div>


    <div id="gameScreen" class="screen">
        <canvas id="game" width="400" height="400"></canvas>
        <h2 style="margin: 10px 0;">SCORE: <span id="score">0</span></h2>
    </div>


    <div id="gameOverScreen" class="screen">
        <h1 style="color: #ff3131;">GAME OVER</h1>
        <p id="finalScore"></p>
        <button id="restart">PLAY AGAIN</button>
        <button id="menuBtn" style="background: #555; color: white;">MAIN MENU</button>
    </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function(){
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const colorPicker = document.getElementById("snakeColor");
    const difficulty = document.getElementById("difficulty");


    const box = 20;
    const size = 400;
    let snake, snake2, npcSnake, direction, direction2, nextDir, nextDir2, food, enemyFood, score, mode, speed, running = false;
    let lastTime = 0, moveTimer = 0, npcMoveTimer = 0;


    document.getElementById("normal").onclick = () => startGame("normal");
    document.getElementById("endless").onclick = () => startGame("endless");
    document.getElementById("survival").onclick = () => startGame("survival");
    document.getElementById("roulette").onclick = () => startGame("roulette");
    document.getElementById("multi").onclick = () => startGame("multiplayer");
    document.getElementById("restart").onclick = () => startGame(mode);
    document.getElementById("menuBtn").onclick = backToMenu;


    function showScreen(id){
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }


    function startGame(selectedMode){
        mode = selectedMode;
        speed = parseInt(difficulty.value);
        score = 0;
        running = true;
        moveTimer = 0;
        npcMoveTimer = 0;
        lastTime = performance.now();
        
        snake = [{x: 200, y: 200, prevX: 200, prevY: 200}];
        direction = nextDir = "RIGHT";
        npcSnake = null;
        enemyFood = null;


        if(mode === "multiplayer"){
            snake2 = [{x: 100, y: 100, prevX: 100, prevY: 100}];
            direction2 = nextDir2 = "RIGHT";
        }


        if(mode === "survival"){
            npcSnake = [{x: 0, y: 0, prevX: 0, prevY: 0}];
            enemyFood = spawnFood();
        }


        food = spawnFood();
        scoreDisplay.innerText = score;
        showScreen("gameScreen");
        requestAnimationFrame(gameLoop);
    }


    function spawnFood(){
        return {
            x: Math.floor(Math.random() * (size / box)) * box,
            y: Math.floor(Math.random() * (size / box)) * box
        };
    }


    document.addEventListener("keydown", e => {
        if(!running) return;
        const key = e.key;
        if(key === "ArrowLeft" && direction !== "RIGHT") nextDir = "LEFT";
        if(key === "ArrowRight" && direction !== "LEFT") nextDir = "RIGHT";
        if(key === "ArrowUp" && direction !== "DOWN") nextDir = "UP";
        if(key === "ArrowDown" && direction !== "UP") nextDir = "DOWN";


        if(mode === "multiplayer"){
            const k = key.toLowerCase();
            if(k === "a" && direction2 !== "RIGHT") nextDir2 = "LEFT";
            if(k === "d" && direction2 !== "LEFT") nextDir2 = "RIGHT";
            if(k === "w" && direction2 !== "DOWN") nextDir2 = "UP";
            if(k === "s" && direction2 !== "UP") nextDir2 = "DOWN";
        }
    });


    function getNextHead(sArr, dir) {
        let head = { x: sArr[0].x, y: sArr[0].y, prevX: sArr[0].x, prevY: sArr[0].y };
        if(dir === "LEFT") head.x -= box;
        if(dir === "RIGHT") head.x += box;
        if(dir === "UP") head.y -= box;
        if(dir === "DOWN") head.y += box;
        return head;
    }


    function gameLoop(currentTime) {
        if (!running) return;
        requestAnimationFrame(gameLoop);
        const deltaTime = currentTime - lastTime;
        lastTime = currentTime;
        
        moveTimer += deltaTime;
        if (moveTimer >= speed) {
            updatePlayerLogic();
            moveTimer = 0;
        }


        let currentNpcSpeed = speed; // Default fallback
        if(mode === "survival" && npcSnake) {
            currentNpcSpeed = Math.max(40, (speed * 1.2) - (score * 3)); 
            npcMoveTimer += deltaTime;
            if (npcMoveTimer >= currentNpcSpeed) {
                updateNPCLogic();
                npcMoveTimer = 0;
            }
        }


        draw(moveTimer / speed, npcMoveTimer / currentNpcSpeed);
    }


    function updatePlayerLogic() {
        direction = nextDir;
        let head1 = getNextHead(snake, direction);
        
        if(mode === "endless") {
            if(head1.x < 0) { head1.x = size - box; head1.prevX = size; } 
            else if(head1.x >= size) { head1.x = 0; head1.prevX = -box; }
            if(head1.y < 0) { head1.y = size - box; head1.prevY = size; } 
            else if(head1.y >= size) { head1.y = 0; head1.prevY = -box; }
        } else if (head1.x < 0 || head1.y < 0 || head1.x >= size || head1.y >= size) return gameOver();
        
        if(snake.some((seg, i) => i !== 0 && seg.x === head1.x && seg.y === head1.y)) return gameOver();
        if(mode === "survival" && npcSnake.some(seg => seg.x === head1.x && seg.y === head1.y)) return gameOver();


        snake.forEach(seg => { seg.prevX = seg.x; seg.prevY = seg.y; });
        snake.unshift(head1);


        if(head1.x === food.x && head1.y === food.y){
            score++; scoreDisplay.innerText = score; food = spawnFood();
            if(mode === "roulette") speed = Math.max(30, Math.floor(Math.random() * 120));
        } else snake.pop();


        if(mode === "multiplayer"){
            direction2 = nextDir2;
            let head2 = getNextHead(snake2, direction2);
            if(head2.x < 0 || head2.y < 0 || head2.x >= size || head2.y >= size || 
               snake2.some(seg => seg.x === head2.x && seg.y === head2.y) ||
               snake.some(seg => seg.x === head2.x && seg.y === head2.y)) return gameOver();
            
            snake2.forEach(seg => { seg.prevX = seg.x; seg.prevY = seg.y; });
            snake2.unshift(head2);
            if(head2.x === food.x && head2.y === food.y) food = spawnFood();
            else snake2.pop();
        }
    }


    function updateNPCLogic() {
        let head = npcSnake[0];
        let npcHead = { x: head.x, y: head.y, prevX: head.x, prevY: head.y };
        
        // Target player if score is high, otherwise target enemy food
        let target = (score < 3) ? enemyFood : (Math.random() > 0.2 ? snake[0] : enemyFood);
        
        if(Math.abs(target.x - npcHead.x) > Math.abs(target.y - npcHead.y)) {
            npcHead.x += (target.x > npcHead.x) ? box : -box;
        } else {
            npcHead.y += (target.y > npcHead.y) ? box : -box;
        }


        npcSnake.forEach(seg => { seg.prevX = seg.x; seg.prevY = seg.y; });
        npcSnake.unshift(npcHead);


        if(npcHead.x === enemyFood.x && npcHead.y === enemyFood.y){
            enemyFood = spawnFood();
        } else {
            npcSnake.pop();
        }


        if(npcHead.x === snake[0].x && npcHead.y === snake[0].y) return gameOver();
    }


    function draw(playerInterp, npcInterp) {
        ctx.fillStyle = "black"; 
        ctx.fillRect(0, 0, size, size);
        
        ctx.fillStyle = "red"; 
        ctx.fillRect(food.x, food.y, box, box);


        if(enemyFood) {
            ctx.fillStyle = "#ff00ff"; 
            ctx.fillRect(enemyFood.x, enemyFood.y, box, box);
        }


        ctx.fillStyle = colorPicker.value;
        drawSnake(snake, playerInterp);


        if(mode === "multiplayer"){
            ctx.fillStyle = "#00d4ff";
            drawSnake(snake2, playerInterp);
        }


        if(mode === "survival" && npcSnake){
            ctx.fillStyle = "#ff3131";
            drawSnake(npcSnake, npcInterp);
        }
    }


    function drawSnake(sArr, interp) {
        sArr.forEach(seg => {
            const drawX = seg.prevX + (seg.x - seg.prevX) * interp;
            const drawY = seg.prevY + (seg.y - seg.prevY) * interp;
            ctx.fillRect(drawX + 1, drawY + 1, box - 2, box - 2);
        });
    }


    function gameOver(){ running = false; document.getElementById("finalScore").innerText = "Final Score: " + score; showScreen("gameOverScreen"); }
    function backToMenu(){ running = false; showScreen("menu"); }
});
</script>
</body>
</html>
