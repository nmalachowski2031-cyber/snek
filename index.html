<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - ALL MODES FIXED</title>
    <style>
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: white; font-family: sans-serif; flex-direction: column; padding: 10px; }
        #ui-container { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid #333; backdrop-filter: blur(10px); width: 90vw; max-width: 400px; max-height: 95vh; box-sizing: border-box; overflow: hidden; }
        canvas { background: #000; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); border: 3px solid lime; border-radius: 5px; max-width: 100%; max-height: 50vh; width: 100%; height: auto; display: block; }
        .screen { display: none; } .active { display: block; }
        h1 { margin: 0 0 15px 0; text-shadow: 0 0 10px lime; font-size: 22px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 15px 0; }
        button { padding: 4px 6px; font-size: 9px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: black; transition: 0.2s; white-space: nowrap; line-height: 1.1; min-height: 22px; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        select, input[type="color"] { width: 100%; padding: 4px; background: #222; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 12px; }
        label { font-size: 8px; color: #aaa; display: block; margin-bottom: 3px; text-align: left; text-transform: uppercase; }
        .score-box { display: flex; justify-content: space-around; margin: 10px 0; }
        .full-width { grid-column: span 3; }
        #pauseScreen { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); z-index: 100; }
        #pauseScreenInner { background: rgba(0,0,0,0.85); border-radius: 12px; padding: 20px 25px; border: 1px solid #444; min-width: 260px; }
        #pauseScreen h2 { margin: 0 0 15px; font-size: 20px; }
        #pauseScreen p { margin: 0 0 15px; font-size: 12px; color: #aaa; }
        #pauseButtons { display: grid; gap: 8px; }
        .mode-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; max-height: 140px; overflow-y: auto; padding: 5px 0; scrollbar-width: thin; scrollbar-color: #555 transparent; }
        .mode-buttons::-webkit-scrollbar { width: 4px; }
        .mode-buttons::-webkit-scrollbar-track { background: transparent; }
        .mode-buttons::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
        #normal { background: lime; } #endless { background: #00d4ff; } #survival { background: #ff3131; color: white; }
        #slither { background: #ff8800; color: white; } #roulette { background: #ff00ff; } #multi { background: #ffcc00; }
        #three { background: #8800ff; color: white; } #winScreen h1 { color: lime; text-shadow: 0 0 20px lime; }
        h3 { font-size: 16px; margin: 5px 0; } #winnerText { font-size: 18px; }
    </style>
</head>
<body>
    <!-- [Same HTML as before] -->
    <div id="ui-container">
        <div id="menu" class="screen active">
            <h1>🐍 NEON SNAKE</h1>
            <div class="controls">
                <div><label>P1 Color</label><input type="color" id="p1Color" value="#00FF00"></div>
                <div><label>P2 Color</label><input type="color" id="p2Color" value="#00d4ff"></div>
                <div><label>P3 Color</label><input type="color" id="p3Color" value="#ffcc00"></div>
                <div class="full-width"><label>Enemy Color</label><input type="color" id="enemyColor" value="#FF3131"></div>
                <div class="full-width">
                    <label>Speed</label>
                    <select id="difficulty">
                        <option value="150">Chill</option>
                        <option value="100" selected>Standard</option>
                        <option value="60">Insane</option>
                    </select>
                </div>
            </div>
            <div class="mode-buttons">
                <button id="normal">NORMAL</button>
                <button id="endless">ENDLESS</button>
                <button id="survival">SURVIVAL</button>
                <button id="slither">SLITHER</button>
                <button id="roulette">CHAOS</button>
                <button id="multi">2P NO WALLS</button>
                <button id="three">3P CHAOS</button>
            </div>
            <p id="coinText" style="font-size: 11px; margin: 8px 0; color: #ffd700;">COINS: 0</p>
            <button id="hatToggle" style="font-size:8px;padding:4px;">FEDORA (10)</button>
            <button id="goldToggle" style="font-size:8px;padding:4px;background:#ffd700;color:black;">GOLD (5)</button>
            <p style="font-size: 11px; margin: 8px 0; color: #777;">BEST: <span id="bestScore">0</span></p>
        </div>


        <div id="gameScreen" class="screen" style="position: relative;">
            <canvas id="game" width="400" height="400"></canvas>
            <div class="score-box">
                <h3>SCORE: <span id="score">0</span></h3>
                <h3>BEST: <span id="bestInGame">0</span></h3>
                <h3 id="modeDisplay">NORMAL</h3>
            </div>
            <p style="font-size: 11px; margin: 5px 0; color: #777;">
                <span id="controlsText">Arrow Keys = Move | ESC = Pause</span>
            </p>
            <div id="pauseScreen">
                <div id="pauseScreenInner">
                    <h2>Paused</h2>
                    <p>ESC or Resume to continue</p>
                    <div id="pauseButtons">
                        <button id="resumeBtn" style="background:#00d4ff;color:black;">RESUME</button>
                        <button id="pauseMenuBtn" style="background:#555; color:white;">MENU</button>
                    </div>
                </div>
            </div>
        </div>


        <div id="gameOverScreen" class="screen">
            <h1 style="color: #ff3131;">GAME OVER</h1>
            <p id="finalScore"></p>
            <button id="restart">PLAY AGAIN</button>
            <button id="menuBtn" style="background: #555; color: white;">MAIN MENU</button>
        </div>


        <div id="winScreen" class="screen">
            <h1 id="winnerText">PLAYER 1 WINS! 🏆</h1>
            <p id="winScore"></p>
            <button id="playAgainWin">PLAY AGAIN</button>
            <button id="menuBtnWin" style="background: #555; color: white;">MAIN MENU</button>
        </div>
    </div>


    <script>
    document.addEventListener("DOMContentLoaded", function(){
        // [All previous variable declarations unchanged]
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const bestDisplay = document.getElementById("bestScore");
        const inGameBest = document.getElementById("bestInGame");
        const modeDisplay = document.getElementById("modeDisplay");
        const controlsText = document.getElementById("controlsText");
        const coinText = document.getElementById("coinText");
        const hatToggle = document.getElementById("hatToggle");
        const goldToggle = document.getElementById("goldToggle");
        const p1CP = document.getElementById("p1Color");
        const p2CP = document.getElementById("p2Color");
        const p3CP = document.getElementById("p3Color");
        const enemyCP = document.getElementById("enemyColor");
        const difficulty = document.getElementById("difficulty");
        const pauseScreen = document.getElementById("pauseScreen");


        const box = 20, size = 400, gridSize = size / box;
        let snakes = { p1: [], p2: [], p3: [], enemy: [] };
        let directions = { p1: "RIGHT", p2: "RIGHT", p3: "RIGHT", enemy: "RIGHT" };
        let moveQueues = { p1: [], p2: [], p3: [], enemy: [] };
        let foods = [];
        let score = 0, mode = "normal", speed = 100, running = false, gameTimeout, paused = false, gameTime = 0;
        let coins = parseInt(localStorage.getItem("neonSnakeCoins") || "0");
        let accessories = JSON.parse(localStorage.getItem("neonSnakeAccessories") || "{}");
        let highScore = parseInt(localStorage.getItem("neonSnakeBest") || "0");


        // [All accessory functions unchanged - keeping them brief]
        if (!accessories.fedora) accessories.fedora = false;
        if (!accessories.gold) accessories.gold = false;
        coinText.innerText = "COINS: " + coins;
        bestDisplay.innerText = highScore;


        function saveAccessories() { localStorage.setItem("neonSnakeAccessories", JSON.stringify(accessories)); }
        function syncAccessoryFlags() { return { fedora: !!accessories.fedora, gold: !!accessories.gold }; }
        function updateHatButton() {
            const flags = syncAccessoryFlags();
            hatToggle.innerText = flags.fedora ? "FEDORA ON ✓" : "FEDORA (10)";
            hatToggle.style.background = flags.fedora ? "#ffd700" : "#ff00ff";
        }
        function updateGoldButton() {
            const flags = syncAccessoryFlags();
            goldToggle.innerText = flags.gold ? "GOLD ON ✓" : "GOLD (5)";
            goldToggle.style.background = flags.gold ? "#ffd700" : "#daa520";
        }
        function addCoins(amount) {
            coins = Math.min(999, coins + amount);
            localStorage.setItem("neonSnakeCoins", coins);
            coinText.innerText = "COINS: " + coins;
        }


        hatToggle.onclick = () => {
            const flags = syncAccessoryFlags();
            if (flags.fedora) accessories.fedora = false;
            else if (coins >= 10) { coins -= 10; localStorage.setItem("neonSnakeCoins", coins); coinText.innerText = "COINS: " + coins; accessories.fedora = true; }
            else { alert("Need 10 coins!"); return; }
            saveAccessories(); updateHatButton(); updateGoldButton();
        };
        goldToggle.onclick = () => {
            const flags = syncAccessoryFlags();
            if (flags.gold) accessories.gold = false;
            else if (coins >= 5) { coins -= 5; localStorage.setItem("neonSnakeCoins", coins); coinText.innerText = "COINS: " + coins; accessories.gold = true; }
            else { alert("Need 5 coins!"); return; }
            saveAccessories(); updateHatButton(); updateGoldButton();
        };


        // Core game functions
        function showScreen(id) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }
        function hidePauseScreen() { pauseScreen.style.display = "none"; }
        function showPauseScreen() { pauseScreen.style.display = "flex"; }
        function backToMenu() {
            running = false; paused = false; if (gameTimeout) clearTimeout(gameTimeout);
            showScreen("menu");
        }


        function resetGame() {
            snakes = { p1: [{x: 200, y: 200}], p2: [], p3: [], enemy: [] };
            directions = { p1: "RIGHT", p2: "RIGHT", p3: "RIGHT", enemy: "RIGHT" };
            moveQueues = { p1: [], p2: [], p3: [], enemy: [] };
            foods = [];
            score = 0; gameTime = 0;
            scoreDisplay.textContent = score; inGameBest.textContent = highScore;
            spawnFood();
        }


        function spawnFood() {
            foods.push({
                x: Math.floor(Math.random() * gridSize) * box,
                y: Math.floor(Math.random() * gridSize) * box
            });
        }


        function wrapPosition(x, y) {
            return {
                x: (x + size) % size,
                y: (y + size) % size
            };
        }


        function moveHead(snakeName, dir) {
            let head = {x: snakes[snakeName][0].x, y: snakes[snakeName][0].y};
            if (dir === "LEFT") head.x -= box;
            else if (dir === "RIGHT") head.x += box;
            else if (dir === "UP") head.y -= box;
            else if (dir === "DOWN") head.y += box;
            return head;
        }


        function checkCollision(snakeName, head) {
            const snake = snakes[snakeName];
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }


        function drawRect(x, y, color, isHead = false) {
            ctx.fillStyle = color; ctx.fillRect(x, y, box, box);
            if (isHead) { ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(x+2, y+2, box-4, box-4); }
        }


        function drawSnake(snakeName, color) {
            const snake = snakes[snakeName];
            if (!snake.length) return;
            
            const flags = syncAccessoryFlags();
            for (let i = 1; i < snake.length; i++) {
                const alpha = Math.max(0.2, 1 - i * 0.03);
                ctx.save(); ctx.globalAlpha = alpha; ctx.shadowColor = color; ctx.shadowBlur = 10 * alpha;
                drawRect(snake[i].x, snake[i].y, color); ctx.restore();
            }
            
            const head = snake[0];
            if (flags.fedora) {
                ctx.save(); ctx.shadowColor = "#FFFFFF"; ctx.shadowBlur = 25;
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(head.x + 2, head.y - 6, box - 4, 4);
                ctx.fillRect(head.x + 3, head.y - 8, box - 6, 3);
                ctx.restore();
            }
            ctx.shadowColor = color; ctx.shadowBlur = 20;
            drawRect(head.x, head.y, color, true);
        }


        function drawFood() {
            ctx.shadowColor = "#ff3131"; ctx.shadowBlur = 15;
            ctx.fillStyle = "#ff3131";
            foods.forEach(f => ctx.fillRect(f.x, f.y, box, box));
            ctx.shadowBlur = 0;
        }


        // 🔥 UPDATED MODE LOGIC WITH WRAP-AROUND FOR NORMAL & SURVIVAL
        function gameLoop() {
            if (!running || paused) return;
            gameTime += speed;


            ctx.clearRect(0, 0, size, size);


            switch(mode) {
                case "normal":
                    updateNormal(); // NOW HAS WRAP-AROUND
                    drawSnake("p1", p1CP.value || "#00FF00");
                    break;
                case "endless":
                    updateEndless();
                    drawSnake("p1", p1CP.value || "#00FF00");
                    break;
                case "survival":
                    updateSurvival(); // NOW HAS WRAP-AROUND
                    drawSnake("p1", p1CP.value || "#00FF00");
                    drawSnake("enemy", enemyCP.value || "#FF3131");
                    break;
                case "slither":
                    updateSlither();
                    drawSnake("p1", p1CP.value || "#00FF00");
                    drawSnake("p2", p2CP.value || "#00d4ff");
                    break;
                case "chaos":
                    updateChaos();
                    drawSnake("p1", p1CP.value || "#00FF00");
                    break;
                case "multiplayer":
                    updateMultiplayer();
                    drawSnake("p1", p1CP.value || "#00FF00");
                    drawSnake("p2", p2CP.value || "#00d4ff");
                    break;
                case "threePlayer":
                    updateThreePlayer();
                    drawSnake("p1", p1CP.value || "#00FF00");
                    drawSnake("p2", p2CP.value || "#00d4ff");
                    drawSnake("p3", p3CP.value || "#ffcc00");
                    break;
            }


            drawFood();
            modeDisplay.textContent = mode.toUpperCase();
            gameTimeout = setTimeout(gameLoop, speed);
        }


        function updateNormal() {
            // ✅ NOW WITH WRAP-AROUND
            if (moveQueues.p1.length) directions.p1 = moveQueues.p1.shift();
            let head = moveHead("p1", directions.p1);
            head = wrapPosition(head.x, head.y); // WRAP-AROUND ADDED
            
            if (checkCollision("p1", head)) { gameOver(); return; }
            
            snakes.p1.unshift(head);
            checkFood("p1");
            if (!foods.some(f => f.x === head.x && f.y === head.y)) snakes.p1.pop();
        }


        function updateEndless() {
            if (moveQueues.p1.length) directions.p1 = moveQueues.p1.shift();
            let head = moveHead("p1", directions.p1);
            head = wrapPosition(head.x, head.y);
            snakes.p1.unshift(head);
            checkFood("p1");
            if (!foods.some(f => f.x === head.x && f.y === head.y)) snakes.p1.pop();
        }


        function updateSurvival() {
            // ✅ NOW WITH WRAP-AROUND FOR BOTH PLAYER & ENEMY
            if (!snakes.enemy.length) snakes.enemy = [{x: 0, y: 0}];
            
            // Player 1
            if (moveQueues.p1.length) directions.p1 = moveQueues.p1.shift();
            let playerHead = moveHead("p1", directions.p1);
            playerHead = wrapPosition(playerHead.x, playerHead.y); // WRAP-AROUND
            
            // Enemy AI
            let enemyHead = moveHead("enemy", directions.enemy);
            let target = snakes.p1[0] || {x: 200, y: 200};
            directions.enemy = chaseAI(enemyHead, target);
            enemyHead = wrapPosition(enemyHead.x, enemyHead.y); // ENEMY WRAPS TOO
            
            if (checkCollision("p1", playerHead) || checkCollision("enemy", enemyHead)) { gameOver(); return; }
            
            snakes.p1.unshift(playerHead);
            snakes.enemy.unshift(enemyHead);
            checkFood("p1");
            
            // Enemy eats food too
            checkFood("enemy");
            
            if (snakes.p1.some(s => s.x === enemyHead.x && s.y === enemyHead.y) || 
                snakes.enemy.some(s => s.x === playerHead.x && s.y === playerHead.y) || 
                gameTime > 20000) {
                gameOver();
            }
        }


        // [Rest of functions unchanged - updateSlither, updateChaos, etc. remain the same]
        function updateSlither() {
            ["p1", "p2"].forEach(p => {
                if (moveQueues[p].length) directions[p] = moveQueues[p].shift();
                let head = moveHead(p, directions[p]);
                head = wrapPosition(head.x, head.y);
                snakes[p].unshift(head);
                checkFood(p);
                
                const other = p === "p1" ? "p2" : "p1";
                if (snakes[other].some(s => s.x === head.x && s.y === head.y)) {
                    document.getElementById("winnerText").textContent = `${other.toUpperCase()} WINS! 🏆`;
                    showScreen("winScreen");
                    running = false;
                    return;
                }
            });
        }


        function checkFood(snakeName) {
            const head = snakes[snakeName][0];
            foods = foods.filter(f => {
                if (f.x === head.x && f.y === head.y) {
                    score += 10;
                    scoreDisplay.textContent = score;
                    spawnFood();
                    return false;
                }
                return true;
            });
        }


        function chaseAI(enemyHead, target) {
            if (Math.abs(enemyHead.x - target.x) > Math.abs(enemyHead.y - target.y)) {
                return enemyHead.x > target.x ? "LEFT" : "RIGHT";
            } else {
                return enemyHead.y > target.y ? "UP" : "DOWN";
            }
        }


        function gameOver() {
            running = false; if (gameTimeout) clearTimeout(gameTimeout);
            document.getElementById("finalScore").innerText = "SCORE: " + score;
            showScreen("gameOverScreen");
            if (score > highScore) {
                highScore = score; localStorage.setItem("neonSnakeBest", highScore);
                bestDisplay.innerText = highScore;
            }
            addCoins(1);
        }


        function startGame(gameMode) {
            mode = gameMode || "normal";
            speed = parseInt(difficulty.value, 10) || 100;
            resetGame();
            showScreen("gameScreen");
            controlsText.textContent = mode.includes("multi") || mode === "slither" ? 
                "Arrows=P1, WASD=P2, " + (mode === "threePlayer" ? "IJKL=P3" : "") + " | ESC=Pause" :
                "Arrow Keys = Move | ESC = Pause";
            hidePauseScreen(); paused = false; running = true;
            gameLoop();
        }


        // [Keyboard controls unchanged]
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") { paused = !paused; if (paused) showPauseScreen(); else { hidePauseScreen(); gameLoop(); } return; }
            
            const keyMap = {
                "ArrowLeft": "p1", "ArrowRight": "p1", "ArrowUp": "p1", "ArrowDown": "p1",
                "KeyA": "p2", "KeyD": "p2", "KeyW": "p2", "KeyS": "p2",
                "KeyI": "p3", "KeyJ": "p3", "KeyK": "p3", "KeyL": "p3"
            };
            
            const player = keyMap[e.code];
            if (player) {
                let dir;
                if (player === "p1") {
                    if (e.code === "ArrowLeft" && directions.p1 !== "RIGHT") dir = "LEFT";
                    if (e.code === "ArrowRight" && directions.p1 !== "LEFT") dir = "RIGHT";
                    if (e.code === "ArrowUp" && directions.p1 !== "DOWN") dir = "UP";
                    if (e.code === "ArrowDown" && directions.p1 !== "UP") dir = "DOWN";
                } else if (player === "p2") {
                    if (e.code === "KeyA" && directions.p2 !== "RIGHT") dir = "LEFT";
                    if (e.code === "KeyD" && directions.p2 !== "LEFT") dir = "RIGHT";
                    if (e.code === "KeyW" && directions.p2 !== "DOWN") dir = "UP";
                    if (e.code === "KeyS" && directions.p2 !== "UP") dir = "DOWN";
                } else if (player === "p3") {
                    if (e.code === "KeyJ" && directions.p3 !== "RIGHT") dir = "LEFT";
                    if (e.code === "KeyL" && directions.p3 !== "LEFT") dir = "RIGHT";
                    if (e.code === "KeyI" && directions.p3 !== "DOWN") dir = "UP";
                    if (e.code === "KeyK" && directions.p3 !== "UP") dir = "DOWN";
                }
                if (dir && dir !== directions[player]) moveQueues[player].push(dir);
            }
        });


        // Event bindings
        ["normal","endless","survival","slither","roulette","multi","three"].forEach(id => {
            document.getElementById(id).onclick = () => startGame(id === "roulette" ? "chaos" : id === "multi" ? "multiplayer" : id === "three" ? "threePlayer" : id);
        });
        document.getElementById("restart").onclick = () => startGame(mode);
        document.getElementById("playAgainWin").onclick = () => startGame(mode);
        document.getElementById("menuBtn").onclick = document.getElementById("menuBtnWin").onclick = backToMenu;
        document.getElementById("resumeBtn").onclick = () => { if (paused) { paused = false; hidePauseScreen(); gameLoop(); } };
        document.getElementById("pauseMenuBtn").onclick = () => { running = false; paused = false; backToMenu(); };


        updateHatButton(); updateGoldButton();
    });
    </script>
</body>
</html>
