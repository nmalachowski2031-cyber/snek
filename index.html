<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Pro</title>
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            flex-direction: column;
            overflow: hidden;
        }


        #ui-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
        }


        canvas {
            background: #000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            border: 3px solid lime;
            border-radius: 5px;
            transition: border-color 0.1s;
        }


        .screen { display: none; }
        .active { display: block; }


        h1 { margin-top: 0; text-shadow: 0 0 10px lime; }


        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }


        button {
            padding: 12px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            background: lime;
            color: black;
            transition: transform 0.1s, brightness 0.2s;
        }


        button:hover { brightness: 1.2; transform: scale(1.05); }
        button:active { transform: scale(0.95); }


        select, input[type="color"] {
            width: 100%;
            padding: 8px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
        }


        label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px; text-align: left; }
    </style>
</head>
<body>


<div id="ui-container">
    <!-- MENU SCREEN -->
    <div id="menu" class="screen active">
        <h1>🐍 NEON SNAKE</h1>
        
        <div class="controls">
            <div>
                <label>SNAKE COLOR</label>
                <input type="color" id="snakeColor" value="#00FF00">
            </div>
            <div>
                <label>SPEED</label>
                <select id="difficulty">
                    <option value="150">Chill</option>
                    <option value="100" selected>Standard</option>
                    <option value="60">Insane</option>
                </select>
            </div>
        </div>


        <div style="display: grid; gap: 10px;">
            <button id="normal">NORMAL MODE</button>
            <button id="endless" style="background: #00d4ff;">ENDLESS MODE</button>
            <button id="roulette" style="background: #ff00ff;">ROULETTE (CHAOS)</button>
            <button id="multi" style="background: #ffcc00;">2 PLAYER (A-S-W-D)</button>
        </div>
    </div>


    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <canvas id="game" width="400" height="400"></canvas>
        <h2 style="margin: 10px 0;">SCORE: <span id="score">0</span></h2>
    </div>


    <!-- GAME OVER SCREEN -->
    <div id="gameOverScreen" class="screen">
        <h1 style="color: #ff3131; text-shadow: 0 0 10px #ff3131;">WASTED</h1>
        <p id="finalScore"></p>
        <button id="restart">PLAY AGAIN</button>
        <button id="menuBtn" style="background: #555; color: white;">MAIN MENU</button>
    </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function(){
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const colorPicker = document.getElementById("snakeColor");
    const difficulty = document.getElementById("difficulty");


    const box = 20;
    const size = 400;
    let snake, snake2, direction, direction2, food, score, mode, interval, speed, running = false;


    // Listeners
    document.getElementById("normal").onclick = () => startGame("normal");
    document.getElementById("endless").onclick = () => startGame("endless");
    document.getElementById("roulette").onclick = () => startGame("roulette");
    document.getElementById("multi").onclick = () => startGame("multiplayer");
    document.getElementById("restart").onclick = () => startGame(mode);
    document.getElementById("menuBtn").onclick = backToMenu;


    function showScreen(id){
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }


    function startGame(selectedMode){
        if(interval) clearInterval(interval);
        
        mode = selectedMode;
        speed = parseInt(difficulty.value);
        score = 0;
        running = true;
        
        snake = [{x: 200, y: 200}];
        direction = "RIGHT";


        if(mode === "multiplayer"){
            snake2 = [{x: 100, y: 200}];
            direction2 = "RIGHT";
        }


        food = spawnFood();
        scoreDisplay.innerText = score;
        showScreen("gameScreen");
        interval = setInterval(loop, speed);
    }


    function spawnFood(){
        return {
            x: Math.floor(Math.random() * (size / box)) * box,
            y: Math.floor(Math.random() * (size / box)) * box
        };
    }


    document.addEventListener("keydown", e => {
        if(!running) return;
        const key = e.key;
        // P1 Controls
        if(key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
        if(key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
        if(key === "ArrowUp" && direction !== "DOWN") direction = "UP";
        if(key === "ArrowDown" && direction !== "UP") direction = "DOWN";


        // P2 Controls
        if(mode === "multiplayer"){
            const k = key.toLowerCase();
            if(k === "a" && direction2 !== "RIGHT") direction2 = "LEFT";
            if(k === "d" && direction2 !== "LEFT") direction2 = "RIGHT";
            if(k === "w" && direction2 !== "DOWN") direction2 = "UP";
            if(k === "s" && direction2 !== "UP") direction2 = "DOWN";
        }
    });


    function moveSnake(s, dir) {
        let head = { ...s[0] };
        if(dir === "LEFT") head.x -= box;
        if(dir === "RIGHT") head.x += box;
        if(dir === "UP") head.y -= box;
        if(dir === "DOWN") head.y += box;
        return head;
    }


    function checkWall(h) {
        return h.x < 0 || h.y < 0 || h.x >= size || h.y >= size;
    }


    function checkSelf(h, body) {
        return body.some(seg => seg.x === h.x && seg.y === h.y);
    }


    function wrap(h) {
        if(h.x < 0) h.x = size - box;
        else if(h.x >= size) h.x = 0;
        if(h.y < 0) h.y = size - box;
        else if(h.y >= size) h.y = 0;
        return h;
    }


    function update(){
        let head = moveSnake(snake, direction);


        if(mode === "endless") {
            head = wrap(head);
            if(checkSelf(head, snake)) return gameOver();
        } else {
            if(checkWall(head) || checkSelf(head, snake)) return gameOver();
        }


        // Collision with P2 in Multi
        if(mode === "multiplayer" && checkSelf(head, snake2)) return gameOver();


        snake.unshift(head);
        if(head.x === food.x && head.y === food.y){
            score++;
            scoreDisplay.innerText = score;
            food = spawnFood();
            if(mode === "roulette") {
                speed = Math.floor(Math.random() * 100) + 40;
                clearInterval(interval);
                interval = setInterval(loop, speed);
                canvas.style.borderColor = "white";
                setTimeout(() => canvas.style.borderColor = "lime", 100);
            }
        } else {
            snake.pop();
        }


        if(mode === "multiplayer"){
            let head2 = moveSnake(snake2, direction2);
            if(checkWall(head2) || checkSelf(head2, snake2) || checkSelf(head2, snake)) return gameOver();
            
            snake2.unshift(head2);
            if(head2.x === food.x && head2.y === food.y){
                food = spawnFood(); // Both snakes can eat
            } else {
                snake2.pop();
            }
        }
    }


    function draw(){
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, size, size);


        // Draw Food
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff3131";
        ctx.fillStyle = "#ff3131";
        ctx.beginPath();
        ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;


        // Draw P1
        ctx.fillStyle = colorPicker.value;
        snake.forEach((seg, i) => {
            ctx.globalAlpha = i === 0 ? 1 : 0.8;
            ctx.fillRect(seg.x + 1, seg.y + 1, box - 2, box - 2);
        });


        // Draw P2
        if(mode === "multiplayer"){
            ctx.globalAlpha = 1;
            ctx.fillStyle = "#00d4ff";
            snake2.forEach((seg, i) => {
                ctx.globalAlpha = i === 0 ? 1 : 0.8;
                ctx.fillRect(seg.x + 1, seg.y + 1, box - 2, box - 2);
            });
        }
        ctx.globalAlpha = 1;
    }


    function loop(){
        if(!running) return;
        update();
        draw();
    }


    function gameOver(){
        running = false;
        clearInterval(interval);
        document.getElementById("finalScore").innerText = "Final Score: " + score;
        showScreen("gameOverScreen");
    }


    function backToMenu(){
        running = false;
        clearInterval(interval);
        showScreen("menu");
    }
});
</script>
</body>
</html>
